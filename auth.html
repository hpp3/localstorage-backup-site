<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LocalStorage Backup — authorizing…</title>
<style>
  html, body { margin: 0; height: 100%; display: flex; align-items: center;
    justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1f2328; background: #fff; }
  .card { padding: 24px 32px; text-align: center; max-width: 360px; }
  .status { font-size: 14px; color: #656d76; margin: 12px 0; }
  button { font: inherit; font-weight: 500; padding: 10px 20px; border-radius: 6px;
    border: 1px solid #0969da; background: #0969da; color: #fff; cursor: pointer; }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="card">
  <h2>LocalStorage Backup</h2>
  <p class="status" id="status">Loading Google Identity…</p>
  <button id="go" style="display:none">Continue with Google</button>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var clientId = params.get('client_id');
  var scope = params.get('scope');
  var state = params.get('state');
  var promptMode = params.get('prompt') || '';
  var statusEl = document.getElementById('status');
  var goBtn = document.getElementById('go');

  function send(payload) {
    if (!window.opener) {
      statusEl.textContent = 'No opener window. Close this tab and try again.';
      return;
    }
    var msg = Object.assign({ type: 'localstorage-backup-oauth', state: state }, payload);
    window.opener.postMessage(msg, '*');
    statusEl.textContent = 'Done. You can close this window.';
    setTimeout(function () { try { window.close(); } catch (e) {} }, 300);
  }

  if (!clientId || !scope || !state) {
    statusEl.textContent = 'Missing parameters.';
    return;
  }

  var tokenClient = null;

  var DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

  function buildClient() {
    if (tokenClient) return tokenClient;
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: scope,
      callback: function (response) {
        if (response.error) {
          send({ error: response.error_description || response.error });
          return;
        }
        if (!response.access_token) {
          send({ error: 'No access_token in response' });
          return;
        }
        // Verify drive.file was granted (user can uncheck individual scopes
        // on Google's consent screen). Without it, every Drive call will 403.
        var hasDrive = google.accounts.oauth2.hasGrantedAllScopes(response, DRIVE_SCOPE);
        if (!hasDrive) {
          // Revoke this partial-scope token before erroring so a retry won't
          // silently re-issue the same useless token.
          google.accounts.oauth2.revoke(response.access_token, function () {
            send({
              error:
                'Drive access was not granted. Please reconnect and keep the Drive permission checked.',
            });
          });
          return;
        }
        send({
          access_token: response.access_token,
          expires_in: parseInt(response.expires_in, 10) || 3600,
        });
      },
      error_callback: function (err) {
        send({ error: (err && (err.message || err.type)) || 'Auth cancelled' });
      },
    });
    return tokenClient;
  }

  function request(prompt) {
    try {
      buildClient().requestAccessToken({ prompt: prompt });
    } catch (e) {
      send({ error: 'requestAccessToken failed: ' + (e && e.message) });
    }
  }

  function whenGisReady(cb) {
    var tries = 0;
    (function wait() {
      if (window.google && window.google.accounts && window.google.accounts.oauth2) return cb();
      if (tries++ > 100) {
        statusEl.textContent = 'Google Identity Services failed to load.';
        return;
      }
      setTimeout(wait, 50);
    })();
  }

  whenGisReady(function () {
    if (promptMode === 'none') {
      // Silent refresh: GIS uses a hidden iframe, no user click needed.
      statusEl.textContent = 'Refreshing token…';
      request('none');
      return;
    }
    // Interactive: Google's OAuth popup needs a user gesture here in auth.html
    // (popup-from-popup is blocked without one). Show a button.
    statusEl.textContent = 'Click Continue to authorize with Google.';
    goBtn.style.display = 'inline-block';
    goBtn.addEventListener('click', function () {
      goBtn.disabled = true;
      goBtn.textContent = 'Waiting for Google…';
      statusEl.textContent = '';
      request(promptMode);
    });
  });
})();
</script>
</body>
</html>
